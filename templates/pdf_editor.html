<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Editor</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Fabric.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f5f9;
}

header {
  background: #2563eb;
  color: white;
  padding: 18px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 20px auto;
  padding: 20px;
}

#toolbar {
  margin-bottom: 15px;
  text-align: center;
}

#toolbar button {
  margin: 6px;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

#pdf-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.pdf-canvas {
  margin: 15px 0;
  border: 1px solid #cbd5e1;
  background: white;
}
</style>
</head>

<body>

<header>
  <h1>PDF Editor</h1>
  <p>Edit PDFs online — draw & save</p>
</header>

<div class="container">

  <input type="file" id="fileInput" accept="application/pdf"><br><br>

  <div id="toolbar">
    <button onclick="setDraw()">✏️ Draw</button>
    <button onclick="addText()">🅰️ Text</button>
    <button onclick="setEraser()">🧽 Eraser</button>
    <button onclick="undo()">↩️ Undo</button>
    <button onclick="redo()">↪️ Redo</button>
    <button onclick="zoomIn()">➕ Zoom</button>
    <button onclick="zoomOut()">➖ Zoom</button>
    <button onclick="setColor('red')">🔴 Red</button>
    <button onclick="setColor('blue')">🔵 Blue</button>
    <button onclick="clearAll()">🧹 Clear</button>
    <button onclick="savePDF()">💾 Save PDF</button>
  </div>

  <div id="pdf-container"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const fileInput = document.getElementById("fileInput");
const pdfContainer = document.getElementById("pdf-container");

let pdfDoc = null;
let scale = 1.5;
let canvases = [];

// ---------- Load PDF ----------
fileInput.addEventListener("change", async () => {
  pdfContainer.innerHTML = "";
  canvases = [];

  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.readAsArrayBuffer(file);

  reader.onload = async () => {
    pdfDoc = await pdfjsLib.getDocument({ data: reader.result }).promise;

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      renderPage(i);
    }
  };
});

// ---------- Render Page ----------
async function renderPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.className = "pdf-canvas";

  pdfContainer.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;

  enableDrawing(canvas);
}

// ---------- Drawing ----------
function enableDrawing(canvas) {
  const fabricCanvas = new fabric.Canvas(canvas, {
    isDrawingMode: true
  });

  fabricCanvas.freeDrawingBrush.width = 2;
  fabricCanvas.freeDrawingBrush.color = "red";

  canvases.push(fabricCanvas);
}

// ---------- Toolbar ----------
function setDraw() {
  canvases.forEach(c => c.isDrawingMode = true);
}

function setColor(color) {
  canvases.forEach(c => {
    c.freeDrawingBrush.color = color;
  });
}

function clearAll() {
  canvases.forEach(c => c.clear());
}

// ---------- Save PDF ----------
async function savePDF() {
  const images = canvases.map(c => c.toDataURL("image/png"));

  const response = await fetch("/save-pdf", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ images })
  });

  const blob = await response.blob();
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "edited.pdf";
  a.click();
}
</script>

</body>
</html>
